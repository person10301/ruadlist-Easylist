name: Обновить ruadlist + EasyList

on:
  schedule:
    - cron: '0 3 * * *'        # каждый день в 3:00 UTC (подойдёт, т.к. список обновляется ~раз в сутки)
  workflow_dispatch:           # можно запустить вручную кнопкой

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Скачать актуальный список фильтров
        run: |
          curl -L -o ruadlist+easylist.txt https://easylist-downloads.adblockplus.org/ruadlist+easylist.txt

      - name: Проверить, изменился ли файл
        id: diff
        run: |
          if git diff --quiet ruadlist+easylist.txt; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push если есть изменения
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ruadlist+easylist.txt
          git commit -m "Автообновление: ruadlist + easylist.txt ($(date -u +'%Y-%m-%d %H:%M UTC'))"
          git push

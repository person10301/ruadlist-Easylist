name: Обновить ruadlist + EasyList

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Скачать свежий список фильтров
        run: |
          curl -L -o ruadlist+easylist.txt https://easylist-downloads.adblockplus.org/ruadlist+easylist.txt
          echo "Файл скачан, размер: $(wc -c < ruadlist+easylist.txt) байт"

      - name: Commit and push (всегда)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ruadlist+easylist.txt
          git commit -m "Автообновление: ruadlist + easylist.txt ($(date -u +'%Y-%m-%d %H:%M UTC'))" || echo "Нет изменений для коммита"
          git push
